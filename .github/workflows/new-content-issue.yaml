name: New content issue → branch + PR

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: new-content-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  generate:
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'content-submission')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'content-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse issue form body
        id: parse
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          script: |
            const body = process.env.ISSUE_BODY || '';
            const fields = {};
            const re = /(?:^|\n)###\s+(.+?)\s*\n+([\s\S]*?)(?=\n### |$)/g;
            for (const m of body.matchAll(re)) {
              const key = m[1].trim().toLowerCase();
              let value = (m[2] || '').trim();
              if (value === '_No response_') value = '';
              fields[key] = value;
            }
            const out = {
              content_type: fields['content type'] || 'blog',
              content_url: fields['url'] || '',
              content_title: fields['title (optional)'] || fields['title'] || '',
              content_language: fields['language'] || '',
              content_photo_url: fields['photo url (optional)'] || fields['photo url'] || '',
              content_rss_feed: fields['rss feed (optional)'] || fields['rss feed'] || '',
              content_description: fields['description (optional)'] || fields['description'] || '',
              author_name: fields['author name'] || '',
              author_twitter: fields['author twitter username'] || '',
              author_mastodon: fields['author mastodon'] || '',
              author_bluesky: fields['author bluesky'] || '',
              author_github: fields['author github username'] || '',
              author_linkedin: fields['author linkedin'] || '',
              author_orcid: fields['author orcid id'] || '',
              directory_ids: fields['directory ids'] || ''
            };
            for (const [k, v] of Object.entries(out)) {
              core.setOutput(k, v);
            }
            core.info(`Parsed: type=${out.content_type} url=${out.content_url}`);

      - name: Bail out if URL or required fields are missing
        if: |
          steps.parse.outputs.content_url == '' ||
          steps.parse.outputs.content_language == '' ||
          steps.parse.outputs.author_name == ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Hi @" + context.payload.issue.user.login +
                ", I need at least **URL**, **Language** and **Author Name** to continue. " +
                "Could you edit the issue to fill those in? Once they're set, remove and re-apply the `content-submission` label and I'll retry."
            });
            core.setFailed('Required fields missing.');

      - name: Install cURL headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "renv"

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2

      - name: Generate content JSON
        id: generate
        env:
          CONTENT_TYPE: ${{ steps.parse.outputs.content_type }}
          CONTENT_URL: ${{ steps.parse.outputs.content_url }}
          CONTENT_TITLE: ${{ steps.parse.outputs.content_title }}
          CONTENT_LANGUAGE: ${{ steps.parse.outputs.content_language }}
          CONTENT_PHOTO_URL: ${{ steps.parse.outputs.content_photo_url }}
          CONTENT_RSS_FEED: ${{ steps.parse.outputs.content_rss_feed }}
          CONTENT_DESCRIPTION: ${{ steps.parse.outputs.content_description }}
          AUTHOR_NAME: ${{ steps.parse.outputs.author_name }}
          AUTHOR_TWITTER: ${{ steps.parse.outputs.author_twitter }}
          AUTHOR_MASTODON: ${{ steps.parse.outputs.author_mastodon }}
          AUTHOR_BLUESKY: ${{ steps.parse.outputs.author_bluesky }}
          AUTHOR_GITHUB: ${{ steps.parse.outputs.author_github }}
          AUTHOR_LINKEDIN: ${{ steps.parse.outputs.author_linkedin }}
          AUTHOR_ORCID: ${{ steps.parse.outputs.author_orcid }}
          DIRECTORY_IDS: ${{ steps.parse.outputs.directory_ids }}
        run: Rscript scripts/issue_to_content.R

      - name: Comment on generation failure
        if: failure() && steps.generate.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          URL: ${{ steps.parse.outputs.content_url }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const url = process.env.URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Hi @" + context.payload.issue.user.login +
                ", I couldn't generate a content JSON for `" + url + "`. " +
                "The script's logs are in the failed workflow run. Common causes: the URL is unreachable, " +
                "or required form fields are missing. Fix the issue and re-apply the `content-submission` label to retry."
            });

      - name: Check for changes and prepare branch
        id: branch
        env:
          FILE_PATH: ${{ steps.generate.outputs.file_path }}
          FILENAME: ${{ steps.generate.outputs.filename }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          branch="auto/new-content-${FILENAME}-${ISSUE}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "file=${FILE_PATH}" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- "$FILE_PATH" && ! git ls-files --others --exclude-standard --error-unmatch "$FILE_PATH" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when nothing changed
        if: steps.branch.outputs.changed == 'false'
        uses: actions/github-script@v7
        env:
          FILE_PATH: ${{ steps.branch.outputs.file }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const file = process.env.FILE_PATH;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Hi @" + context.payload.issue.user.login +
                ", I generated `" + file + "` but it's identical to what's already on `main` — nothing to add. " +
                "If something needs changing, edit the existing file via a PR or describe the change here."
            });

      - name: Push branch
        if: steps.branch.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          FILE_PATH: ${{ steps.branch.outputs.file }}
          FILENAME: ${{ steps.generate.outputs.filename }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git config user.name "Jinx[bot]"
          git config user.email "jinx@rladies.org"
          git checkout -b "$BRANCH"
          git add "$FILE_PATH"
          git commit -m "Add ${FILENAME} (issue #${ISSUE})"
          git push --force-with-lease origin "$BRANCH"

      - name: Open or update draft PR
        if: steps.branch.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
          FILE_PATH: ${{ steps.branch.outputs.file }}
          FILENAME: ${{ steps.generate.outputs.filename }}
          CONTENT_TYPE: ${{ steps.generate.outputs.content_type }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = process.env.BRANCH;
            const file = process.env.FILE_PATH;
            const filename = process.env.FILENAME;
            const contentType = process.env.CONTENT_TYPE;
            const issueNumber = context.issue.number;
            const author = context.payload.issue.user.login;

            const body = [
              `Auto-generated from #${issueNumber}.`,
              ``,
              `Generated a **${contentType}** entry for \`${filename}\` and wrote it to \`${file}\`.`,
              ``,
              `@${author} please review the file — fields like the description, image, and RSS feed are scraped from the page and may need touch-up. If the content has multiple authors, add them directly in this PR.`,
              ``,
              `Closes #${issueNumber}.`
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            let pr;
            let prCreated = false;
            if (existing.data.length > 0) {
              pr = existing.data[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body
              });
              core.info(`Updated existing PR #${pr.number}`);
            } else {
              const created = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Add ${filename} (issue #${issueNumber})`,
                head: branch,
                base: context.payload.repository.default_branch,
                body,
                draft: true
              });
              pr = created.data;
              prCreated = true;
              core.info(`Opened PR #${pr.number}`);
            }

            // Assign the issue author to the PR so it shows up on their dashboard.
            // Silently no-ops for users without write access (GitHub ignores them).
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [author]
              });
            } catch (e) {
              core.info(`Could not assign @${author} to PR #${pr.number}: ${e.message}`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Hi @${author}, I drafted [\`${file}\`](${pr.html_url}/files) on branch \`${branch}\` and opened ${pr.html_url} for review. Take a look and request adjustments on the PR — the description, photo and RSS feed are best-effort scrapes and may need fixing. I'm closing this issue; let's continue on the PR.`
            });

            // Move communication to the PR by closing the issue once the PR is up.
            // Only on first creation — if a maintainer reopened the issue, leave it.
            if (prCreated) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }
